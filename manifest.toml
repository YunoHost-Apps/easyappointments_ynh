packaging_format = 2

id = "easyappointments"
name = "Easy!Appointments"
description.en = "Allows your clients to schedule appointments with you"
description.fr = "Permet à vos clients de prendre rendez-vous avec vous"

version = "1.6.0~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0-only"
website = "https://easyappointments.org/"
demo = "https://demo.easyappointments.org/"
admindoc = "https://easyappointments.org/docs.html#1.5.0/readme.md"
code = "https://github.com/alextselegidis/easyappointments"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "700M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.language]
    ask.en = "Choose the application language"
    ask.fr = "Choisissez la langue de l'application"
    type = "select"
    choices = ["french", "english"]
    default = "english"

[resources]
        [resources.sources.main]
        url = "https://github.com/alextselegidis/easyappointments/releases/download/1.6.0/easyappointments-1.6.0.zip"
        sha256 = "299f8da75583ea185992ece4ac0b10e98f673825edbf75116446d99001911e60"
        in_subdir = false
        autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "mariadb-server, php8.5-mbstring, php8.5-gd, php8.5-curl, php8.5-mysql"

    [resources.database]
    type = "mysql"
